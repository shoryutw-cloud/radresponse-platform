// ── 地圖飛到事件座標，並更新影響範圍圓形 ──
function flyToEvent(idx) {
  var ev = _events[idx];
  if (!gMap || !ev) return;
  var lat = parseFloat(ev.lat), lng = parseFloat(ev.lng);
  if (isNaN(lat) || isNaN(lng)) return;
  gMap.flyTo([lat, lng], 14, { duration: 0.8 });
  // 套用事件的風向（若有值）
  if (ev.windDir && ev.windDir !== '') {
    _windDeg = (parseFloat(ev.windDir) + 180) % 360;
  }
  // 高亮當前標記
  _markers.forEach(function(m, i) {
    var el = m.getElement ? m.getElement() : null;
    if (el) el.style.opacity = (i === idx) ? '1' : '0.45';
  });
  // 更新半透明圓形
  buildEventLayers(idx); // 重建該事件圖層（可能風向有更新）
  loadMeasurements(idx, true);
  startMsrTimer(idx);
}

// ── 圖層物件：每個事件獨立存放 ──
// _evLayers[idx] = { circle, line, sector }
var _evLayers = {};
var _windDeg  = 270; // 預設東風
var _msrMarkers   = []; // 量測標記
var _clusterMode  = 'none'; // 'pixel' | 'geo' | 'none'
var _clusterPixel = 80;      // 像素聚合距離（px）
var _clusterGeoM  = 500;     // 地理聚合距離（公尺）
var _msrCache   = {}; // { eventId: [measurements] }

// ── 角度換算工具（bearing in degrees, distance in meters）──
function destPoint(lat, lng, bearingDeg, distM) {
  var R = 6371000;
  var d = distM / R;
  var b = bearingDeg * Math.PI / 180;
  var lat1 = lat * Math.PI / 180;
  var lng1 = lng * Math.PI / 180;
  var lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) + Math.cos(lat1)*Math.sin(d)*Math.cos(b));
  var lng2 = lng1 + Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(lat1), Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
  return [lat2 * 180 / Math.PI, lng2 * 180 / Math.PI];
}

// ── 建立某個事件的圖層 ──
function buildEventLayers(idx) {
  var ev = _events[idx];
  if (!ev || !gMap) return;
  var la = parseFloat(ev.lat), lo = parseFloat(ev.lng);
  if (isNaN(la) || isNaN(lo)) return;

  // 取該事件的風向（有設定用設定值，否則預設270）
  var wd = (ev.windDir && ev.windDir !== '') ? (parseFloat(ev.windDir) + 180) % 360 : 270;

  // 移除舊圖層
  removeEventLayers(idx);
  if (!_evLayers[idx]) _evLayers[idx] = {};

  // checkbox 狀態
  var showCircle = isLayerOn(idx, 'circle');
  var showLine   = isLayerOn(idx, 'line');
  var showSector = isLayerOn(idx, 'sector');

  // (1) 100m 圓
  if (showCircle) {
    _evLayers[idx].circle = L.circle([la, lo], {
      radius: 100, color: '#f97316', fillColor: '#f97316',
      fillOpacity: 0.15, weight: 2, dashArray: '6 4', opacity: 0.8
    }).addTo(gMap);
  }

  // (2) 1km 橫切面（需有風向才顯示）
  var hasWind = ev.windDir && ev.windDir !== '';
  if (showLine && hasWind) {
    var lineCenter = destPoint(la, lo, wd, 1000);
    var perpA = destPoint(lineCenter[0], lineCenter[1], (wd + 90) % 360, 500);
    var perpB = destPoint(lineCenter[0], lineCenter[1], (wd - 90 + 360) % 360, 500);
    _evLayers[idx].line = L.polyline([perpA, perpB], {
      color: '#3b82f6', weight: 3, opacity: 0.85, dashArray: '8 4'
    }).addTo(gMap);

    // ── 編號1：1km 橫切面 × 中線交點（藍色）──
    var pt1 = destPoint(la, lo, wd, 1000);
    var icon1 = L.divIcon({
      className: '',
      html: '<div style="width:22px;height:22px;border-radius:50%;' +
            'background:#3b82f6;border:2px solid white;' +
            'display:flex;align-items:center;justify-content:center;' +
            'font-size:11px;font-weight:700;color:white;' +
            'box-shadow:0 1px 5px rgba(0,0,0,.45);' +
            'font-family:ui-monospace,monospace">1</div>',
      iconSize: [22, 22], iconAnchor: [11, 11]
    });
    var mk1 = L.marker(pt1, { icon: icon1 }).addTo(gMap);
    mk1.bindTooltip('1：1km × 中線', { permanent: false, direction: 'top' });
    _evLayers[idx].ptMk1 = mk1;

    // ── 編號2：500m 中線點（橘色，只顯示點）──
    var pt2 = destPoint(la, lo, wd, 500);
    var icon2 = L.divIcon({
      className: '',
      html: '<div style="width:22px;height:22px;border-radius:50%;' +
            'background:#f97316;border:2px solid white;' +
            'display:flex;align-items:center;justify-content:center;' +
            'font-size:11px;font-weight:700;color:white;' +
            'box-shadow:0 1px 5px rgba(0,0,0,.45);' +
            'font-family:ui-monospace,monospace">2</div>',
      iconSize: [22, 22], iconAnchor: [11, 11]
    });
    var mk2 = L.marker(pt2, { icon: icon2 }).addTo(gMap);
    mk2.bindTooltip('2：500m × 中線', { permanent: false, direction: 'top' });
    _evLayers[idx].ptMk2 = mk2;
  }

  // (3) 5km 扇形（需有風向才顯示）
  if (showSector && hasWind) {
    var pts = [[la, lo]];
    for (var i = 0; i <= 40; i++) {
      pts.push(destPoint(la, lo, (wd - 22.5) + 45 * i / 40, 5000));
    }
    pts.push([la, lo]);
    _evLayers[idx].sector = L.polygon(pts, {
      color: '#8b5cf6', fillColor: '#8b5cf6',
      fillOpacity: 0.12, weight: 2, opacity: 0.7
    }).addTo(gMap);

    // ── 2km 弧線 ──
    var arc2 = [];
    for (var a2 = 0; a2 <= 24; a2++) arc2.push(destPoint(la, lo, (wd - 22.5) + 45 * a2 / 24, 2000));
    _evLayers[idx].arc2 = L.polyline(arc2, { color: '#8b5cf6', weight: 1.5, opacity: 0.65, dashArray: '5 4' }).addTo(gMap);

    // ── 3km 弧線 ──
    var arc3 = [];
    for (var a3 = 0; a3 <= 24; a3++) arc3.push(destPoint(la, lo, (wd - 22.5) + 45 * a3 / 24, 3000));
    _evLayers[idx].arc3 = L.polyline(arc3, { color: '#8b5cf6', weight: 1.5, opacity: 0.65, dashArray: '5 4' }).addTo(gMap);

    // ── 4km 弧線 ──
    var arc4 = [];
    for (var a4 = 0; a4 <= 24; a4++) arc4.push(destPoint(la, lo, (wd - 22.5) + 45 * a4 / 24, 4000));
    _evLayers[idx].arc4 = L.polyline(arc4, { color: '#8b5cf6', weight: 1.5, opacity: 0.65, dashArray: '5 4' }).addTo(gMap);

    // ── 8 個編號交叉點（3~10）──
    // 越內圈編號越小
    var crossDefs = [
      { label: '3',  pt: destPoint(la, lo, wd,        2000), tip: '2km × 中線' },
      { label: '4',  pt: destPoint(la, lo, wd - 22.5, 3000), tip: '3km × 扇形上緣' },
      { label: '5',  pt: destPoint(la, lo, wd,        3000), tip: '3km × 中線' },
      { label: '6',  pt: destPoint(la, lo, wd + 22.5, 3000), tip: '3km × 扇形下緣' },
      { label: '7',  pt: destPoint(la, lo, wd,        4000), tip: '4km × 中線' },
      { label: '8',  pt: destPoint(la, lo, wd - 22.5, 5000), tip: '5km × 扇形上緣' },
      { label: '9',  pt: destPoint(la, lo, wd,        5000), tip: '5km × 中線' },
      { label: '10', pt: destPoint(la, lo, wd + 22.5, 5000), tip: '5km × 扇形下緣' },
    ];

    var sectorMks = [];
    crossDefs.forEach(function(def) {
      var isDouble = def.label === '10'; // 兩位數字要稍小
      var icon = L.divIcon({
        className: '',
        html: '<div style="' +
              'width:22px;height:22px;border-radius:50%;' +
              'background:#8b5cf6;border:2px solid white;' +
              'display:flex;align-items:center;justify-content:center;' +
              'font-size:' + (isDouble ? '9' : '11') + 'px;font-weight:700;color:white;' +
              'box-shadow:0 1px 5px rgba(0,0,0,.45);' +
              'font-family:ui-monospace,monospace' +
              '">' + def.label + '</div>',
        iconSize: [22, 22], iconAnchor: [11, 11]
      });
      var mk = L.marker(def.pt, { icon: icon }).addTo(gMap);
      mk.bindTooltip(def.label + '：' + def.tip, { permanent: false, direction: 'top' });
      sectorMks.push(mk);
    });
    _evLayers[idx].sectorMks = sectorMks;
  }
}

function removeEventLayers(idx) {
  var lyr = _evLayers[idx];
  if (!lyr) return;
  if (lyr.circle)  { lyr.circle.remove();  lyr.circle  = null; }
  if (lyr.line)    { lyr.line.remove();    lyr.line    = null; }
  if (lyr.ptMk1)   { lyr.ptMk1.remove();  lyr.ptMk1   = null; }
  if (lyr.ptMk2)   { lyr.ptMk2.remove();  lyr.ptMk2   = null; }
  if (lyr.sector)  { lyr.sector.remove();  lyr.sector  = null; }
  if (lyr.arc2)    { lyr.arc2.remove();    lyr.arc2    = null; }
  if (lyr.arc3)    { lyr.arc3.remove();    lyr.arc3    = null; }
  if (lyr.arc4)    { lyr.arc4.remove();    lyr.arc4    = null; }
  if (lyr.sectorMks) {
    lyr.sectorMks.forEach(function(m) { m.remove(); });
    lyr.sectorMks = null;
  }
}

// ── 每個事件的圖層偏好記憶（key: eventId, value: {circle,line,sector,msr}）──
// 預設全部為 true（全開），使用者勾選後自動記憶
var _layerPrefs = {};

// 取得指定事件+圖層的記憶狀態（未曾設定過則預設 true）
function getLayerPref(eventId, type) {
  if (!_layerPrefs[eventId]) return true;
  var val = _layerPrefs[eventId][type];
  return (val === undefined) ? true : val;
}

// 儲存使用者勾選狀態
function saveLayerPref(eventId, type, checked) {
  if (!_layerPrefs[eventId]) _layerPrefs[eventId] = {};
  _layerPrefs[eventId][type] = checked;
}

// checkbox 狀態（先查記憶，再查 DOM）
function isLayerOn(idx, type) {
  var ev = _events[idx];
  if (ev) {
    // 優先從記憶取值（不依賴 DOM 是否存在）
    return getLayerPref(ev.id, type);
  }
  var cb = document.getElementById('lyr_' + idx + '_' + type);
  return cb ? cb.checked : true;
}

// ── 重建所有事件的圖層 ──
function updateLayers(lat, lng) {
  _events.forEach(function(_, i) { buildEventLayers(i); });
}

function removeLayers() {
  _events.forEach(function(_, i) { removeEventLayers(i); });
}

// ── 定時刷新計時器 ──
var _msrTimer = null;

// ── 載入並顯示量測標記（force=true 時略過快取）──
function loadMeasurements(idx, force) {
  if (!gMap) return;
  var ev = _events[idx];
  if (!ev) return;

  if (!force && _msrCache[ev.id]) {
    renderMsrMarkers(ev.id);
    return;
  }

  _jsonpGet(SHEETS_URL + '?action=measurements&eventId=' + encodeURIComponent(ev.id), function(data) {
    _msrCache[ev.id] = (data && data.measurements) ? data.measurements : [];
    renderMsrMarkers(ev.id);
  });
}

// ── 啟動定時刷新（5秒）──
function startMsrTimer(idx) {
  stopMsrTimer();
  _msrTimer = setInterval(function() {
    var cb = document.getElementById('lyr_' + idx + '_msr');
    if (cb && cb.checked) loadMeasurements(idx, true);
  }, 5000);
}

function stopMsrTimer() {
  if (_msrTimer) { clearInterval(_msrTimer); _msrTimer = null; }
}

// ── 設定聚合模式 ──
function setClusterMode(mode) {
  _clusterMode = mode;
  // 更新按鈕樣式
  ['none','pixel','geo'].forEach(function(m) {
    document.querySelectorAll('.cluster-btn').forEach(function(btn) {
      if (btn.textContent.indexOf(m==='none'?'不聚合':m==='pixel'?'像素':'地理') !== -1)
        btn.classList.toggle('active', m === mode);
    });
  });
  // 重繪
  var ev = _events[_curIdx];
  if (ev) renderMsrMarkers(ev.id);
}

// ── 計算兩點地理距離（m）──
function geoDistM(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLng = (lng2-lng1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── 貪婪聚合：回傳群組陣列，每群含 members[] 和代表點（最大值）──
function clusterMsrPoints(valid, mode) {
  if (mode === 'none') {
    return valid.map(function(msr) { return { rep: msr, members: [msr] }; });
  }
  var used   = valid.map(function() { return false; });
  var groups = [];
  valid.forEach(function(msr, i) {
    if (used[i]) return;
    var grp = [msr];
    used[i] = true;
    valid.forEach(function(other, j) {
      if (used[j]) return;
      var close = false;
      if (mode === 'pixel') {
        var pa = gMap.latLngToContainerPoint(L.latLng(parseFloat(msr.lat), parseFloat(msr.lng)));
        var pb = gMap.latLngToContainerPoint(L.latLng(parseFloat(other.lat), parseFloat(other.lng)));
        close = Math.hypot(pa.x-pb.x, pa.y-pb.y) < _clusterPixel;
      } else {
        close = geoDistM(parseFloat(msr.lat), parseFloat(msr.lng),
                         parseFloat(other.lat), parseFloat(other.lng)) < _clusterGeoM;
      }
      if (close) { grp.push(other); used[j] = true; }
    });
    // 代表點 = 最大值
    grp.sort(function(a,b){ return parseFloat(b.value)-parseFloat(a.value); });
    groups.push({ rep: grp[0], members: grp });
  });
  return groups;
}

function renderMsrMarkers(eventId) {
  _msrMarkers.forEach(function(m) { m.remove(); });
  _msrMarkers = [];

  var list = _msrCache[eventId] || [];
  var valid = list.filter(function(msr) {
    return !isNaN(parseFloat(msr.lat)) && !isNaN(parseFloat(msr.lng));
  });
  if (!valid.length) return;

  // ── 聚合分組 ──
  var groups = clusterMsrPoints(valid, _clusterMode);

  // ── 聚合群組（多點）渲染為圓圈 ──
  groups.forEach(function(grp) {
    if (grp.members.length <= 1) return; // 單點走原本流程
    var rep = grp.rep;
    var val = parseFloat(rep.value);
    var col = val >= 100 ? '#dc2626' : val >= 0.5 ? '#f97316' : '#16a34a';
    var ll  = L.latLng(parseFloat(rep.lat), parseFloat(rep.lng));
    var sz  = grp.members.length > 5 ? 44 : 36;
    var clusterIcon = L.divIcon({
      className: '',
      html: '<div class="msr-cluster" style="width:'+sz+'px;height:'+sz+'px;background:'+col+';color:white;">' +
            '<span style="font-size:10px;font-weight:800;line-height:1">' + val.toFixed(1) + '</span>' +
            '<span style="font-size:9px;opacity:.8">×'+grp.members.length+'</span>' +
            '</div>',
      iconSize: [sz,sz], iconAnchor: [sz/2,sz/2]
    });
    var mk = L.marker(ll, { icon: clusterIcon }).addTo(gMap);
    // 點擊展開：切換成 none 模式
    mk.on('click', function() { setClusterMode('none'); });
    // tooltip 顯示所有點的值
    var tipHTML = grp.members.map(function(m) {
      return parseFloat(m.value).toFixed(3) + ' μSv/h (' + (m.reporter||'?') + ')';
    }).join('<br>');
    mk.bindTooltip(tipHTML, { direction: 'top' });
    _msrMarkers.push(mk);
  });

  // ── 單點或不聚合：走原本的標籤放置流程 ──
  var singles = groups.filter(function(g){ return g.members.length === 1; })
                      .map(function(g){ return g.rep; });

  if (!singles.length) return;
  // 把 valid 替換成 singles，繼續原本流程
  valid = singles;

  var LW = 144, LH = 34;  // 標籤估計寬高（px）
  var DOT_R = 14;          // 量測點圓圈佔位半徑
  var EV_R  = 26;          // 事發地點佔位半徑

  // ★ 固定虛線長度：60px（不隨縮放變，保持視覺一致）
  var LINE_LEN = 55;
  var R_MAX    = LINE_LEN + 100; // 最多往外推 100px，不讓標籤跑太遠

  // ★ 使用 containerPoint（容器像素座標），確保 clamp 與碰撞在同一座標系
  var pts = valid.map(function(msr) {
    var ll = L.latLng(parseFloat(msr.lat), parseFloat(msr.lng));
    return { msr: msr, ll: ll, cp: gMap.latLngToContainerPoint(ll) };
  });

  var mSize = gMap.getSize();  // {x: width, y: height}
  var PAD   = 6;

  function rectsOverlap(a, b) {
    var GAP = 10;
    return !(a.x + a.w + GAP < b.x || b.x + b.w + GAP < a.x ||
             a.y + a.h + GAP < b.y || b.y + b.h + GAP < a.y);
  }

  function clamp(cx, cy) {
    cx = Math.max(LW/2 + PAD, Math.min(mSize.x - LW/2 - PAD, cx));
    cy = Math.max(LH/2 + PAD, Math.min(mSize.y - LH/2 - PAD, cy));
    return { x: cx, y: cy };
  }

  // ★ 判斷線段 (ax,ay)→(bx,by) 是否穿過以 (cx,cy) 為圓心 r 為半徑的圓
  function lineIntersectsCircle(ax, ay, bx, by, cx, cy, r) {
    var dx = bx - ax, dy = by - ay;
    var fx = ax - cx, fy = ay - cy;
    var a = dx*dx + dy*dy;
    if (a === 0) return Math.hypot(fx, fy) < r;
    var b = 2*(fx*dx + fy*dy);
    var cc = fx*fx + fy*fy - r*r;
    var disc = b*b - 4*a*cc;
    if (disc < 0) return false;
    var sq = Math.sqrt(disc);
    var t1 = (-b - sq) / (2*a);
    var t2 = (-b + sq) / (2*a);
    return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
  }

  // 建立禁區圓清單（事發地點）
  var forbidCircles = [];
  _events.forEach(function(ev) {
    if (isNaN(parseFloat(ev.lat))) return;
    var ep = gMap.latLngToContainerPoint(L.latLng(parseFloat(ev.lat), parseFloat(ev.lng)));
    forbidCircles.push({ x: ep.x, y: ep.y, r: EV_R });
  });

  // ── 已佔位清單（容器像素座標）──
  var placed = [];

  // 量測點圓圈
  pts.forEach(function(pt) {
    placed.push({ x: pt.cp.x - DOT_R, y: pt.cp.y - DOT_R, w: DOT_R*2, h: DOT_R*2 });
  });

  // 事發地點（不隨 zoom 做 100m 禁區，只保護圖釘本身）
  _events.forEach(function(ev) {
    if (isNaN(parseFloat(ev.lat))) return;
    var ep = gMap.latLngToContainerPoint(L.latLng(parseFloat(ev.lat), parseFloat(ev.lng)));
    placed.push({ x: ep.x - EV_R, y: ep.y - EV_R, w: EV_R*2, h: EV_R*2 });
  });

  // 依數值大小排序（高→低），大值優先
  pts.sort(function(a, b) {
    return parseFloat(b.msr.value) - parseFloat(a.msr.value);
  });

  // 當前事發點容器座標
  var curEv = _events[_curIdx];
  var evCP = (curEv && !isNaN(parseFloat(curEv.lat)))
    ? gMap.latLngToContainerPoint(L.latLng(parseFloat(curEv.lat), parseFloat(curEv.lng)))
    : null;

  // 候選角度：以「垂直於徑向」為基準，往兩側每 20° 展開
  function buildAngles(base) {
    var angles = [base, base + 180];
    for (var a = 20; a < 180; a += 20) {
      angles.push(base + a);
      angles.push(base - a);
    }
    return angles;
  }

  pts.forEach(function(pt) {
    // 最佳起始角 = 垂直於「事發點→量測點」的徑向
    var baseAngle;
    if (evCP) {
      var dx = pt.cp.x - evCP.x, dy = pt.cp.y - evCP.y;
      var radial = Math.atan2(dy, dx) * 180 / Math.PI;
      // 選垂直方向（+90 或 -90）中，遠離其他量測點的那個
      var perp1 = radial + 90, perp2 = radial - 90;
      var score1 = 0, score2 = 0;
      pts.forEach(function(other) {
        if (other === pt) return;
        var r1 = Math.hypot(pt.cp.x + LINE_LEN*Math.cos(perp1*Math.PI/180) - other.cp.x,
                             pt.cp.y + LINE_LEN*Math.sin(perp1*Math.PI/180) - other.cp.y);
        var r2 = Math.hypot(pt.cp.x + LINE_LEN*Math.cos(perp2*Math.PI/180) - other.cp.x,
                             pt.cp.y + LINE_LEN*Math.sin(perp2*Math.PI/180) - other.cp.y);
        score1 += r1; score2 += r2;
      });
      baseAngle = (score1 >= score2) ? perp1 : perp2;
    } else {
      // fallback：遠離其他量測點
      var ox = 0, oy = 0;
      pts.forEach(function(other) {
        if (other === pt) return;
        var d = Math.hypot(pt.cp.x - other.cp.x, pt.cp.y - other.cp.y) || 1;
        ox += (pt.cp.x - other.cp.x)/d;
        oy += (pt.cp.y - other.cp.y)/d;
      });
      baseAngle = (ox||oy) ? Math.atan2(oy,ox)*180/Math.PI : -45;
    }

    var angles = buildAngles(baseAngle);
    var placed_ok = false;

    outer3:
    for (var r = LINE_LEN; r <= R_MAX; r += 8) {
      for (var ai = 0; ai < angles.length; ai++) {
        var rad = angles[ai] * Math.PI / 180;
        var cx  = pt.cp.x + r * Math.cos(rad);
        var cy  = pt.cp.y + r * Math.sin(rad);
        var cl  = clamp(cx, cy);
        var rect = { x: cl.x - LW/2, y: cl.y - LH/2, w: LW, h: LH };
        var clash = false;
        for (var pi = 0; pi < placed.length; pi++) {
          if (rectsOverlap(rect, placed[pi])) { clash = true; break; }
        }
        // ★ 檢查虛線是否穿過事發地點禁區
        if (!clash) {
          for (var ci = 0; ci < forbidCircles.length; ci++) {
            var fc = forbidCircles[ci];
            if (lineIntersectsCircle(pt.cp.x, pt.cp.y, cl.x, cl.y, fc.x, fc.y, fc.r)) {
              clash = true; break;
            }
          }
        }
        if (!clash) {
          placed.push(rect);
          // ★ 用 containerPointToLatLng 轉回地理座標
          pt.offLL = gMap.containerPointToLatLng(L.point(cl.x, cl.y));
          placed_ok = true;
          break outer3;
        }
      }
    }
    if (!placed_ok) {
      // fallback：忽略禁區，只保證不和其他標籤重疊，取最近可放位置
      outer4:
      for (var r2 = LINE_LEN; r2 <= R_MAX + 80; r2 += 8) {
        for (var ai2 = 0; ai2 < angles.length; ai2++) {
          var rad2 = angles[ai2] * Math.PI / 180;
          var cx2 = pt.cp.x + r2 * Math.cos(rad2);
          var cy2 = pt.cp.y + r2 * Math.sin(rad2);
          var cl2 = clamp(cx2, cy2);
          var rect2 = { x: cl2.x - LW/2, y: cl2.y - LH/2, w: LW, h: LH };
          var clash2 = false;
          for (var pi2 = 0; pi2 < placed.length; pi2++) {
            if (rectsOverlap(rect2, placed[pi2])) { clash2 = true; break; }
          }
          if (!clash2) {
            placed.push(rect2);
            pt.offLL = gMap.containerPointToLatLng(L.point(cl2.x, cl2.y));
            break outer4;
          }
        }
      }
      if (!pt.offLL) {
        var cl0 = clamp(pt.cp.x + LINE_LEN * Math.cos(baseAngle*Math.PI/180),
                        pt.cp.y + LINE_LEN * Math.sin(baseAngle*Math.PI/180));
        placed.push({ x: cl0.x - LW/2, y: cl0.y - LH/2, w: LW, h: LH });
        pt.offLL = gMap.containerPointToLatLng(L.point(cl0.x, cl0.y));
      }
    }
  });
  // ── 渲染三件組：圓點 + 指引線 + 標籤 ──
  pts.forEach(function(pt) {
    var msr = pt.msr;
    var val = parseFloat(msr.value);
    var col = val >= 100 ? '#dc2626' : val >= 0.5 ? '#f97316' : '#16a34a';
    var offLL = pt.offLL;

    // 圓點
    var dotIcon = L.divIcon({
      className: '',
      html: '<div style="width:13px;height:13px;background:' + col + ';' +
            'border:2.5px solid white;border-radius:50%;' +
            'box-shadow:0 1px 6px rgba(0,0,0,.5)"></div>',
      iconSize: [13,13], iconAnchor: [6,6]
    });
    _msrMarkers.push(L.marker(pt.ll, { icon: dotIcon, interactive: false }).addTo(gMap));

    // 指引線
    _msrMarkers.push(L.polyline([pt.ll, offLL], {
      color: col, weight: 2.5, opacity: 0.85, dashArray: '6 3'
    }).addTo(gMap));

    // 數值標籤
    var labelIcon = L.divIcon({
      className: '',
      html: '<div style="background:white;border-left:4px solid ' + col + ';' +
            'border-radius:5px;padding:4px 10px 4px 8px;' +
            'box-shadow:0 2px 8px rgba(0,0,0,.22);' +
            'white-space:nowrap;display:inline-flex;align-items:baseline;gap:3px;">' +
            '<span style="font-size:13px;font-weight:800;color:#1e2a3a;font-family:ui-monospace,monospace">' +
            val.toFixed(3) + '</span>' +
            '<span style="font-size:10px;color:#6b7a92;font-family:ui-monospace,monospace">&#x03BC;Sv/h</span>' +
            '</div>',
      iconAnchor: [LW/2, LH/2]
    });
    var label = L.marker(offLL, { icon: labelIcon }).addTo(gMap);

    var dtStr = '';
    try {
      var d = new Date(msr.time);
      if (!isNaN(d.getTime())) {
        var yy = d.getFullYear();
        var mm = String(d.getMonth()+1).padStart(2,'0');
        var dd = String(d.getDate()).padStart(2,'0');
        var hh = String(d.getHours()).padStart(2,'0');
        var mi = String(d.getMinutes()).padStart(2,'0');
        dtStr = yy + '/' + mm + '/' + dd + ' ' + hh + ':' + mi;
      }
    } catch(e) {}
    label.bindPopup(
      '<div class="msr-popup">' +
      '<span class="msr-popup-val" style="color:' + col + '">' + val.toFixed(3) + '</span>' +
      '<span class="msr-popup-unit">&#x03BC;Sv/h</span>' +
      '<div class="msr-popup-info">' + (msr.reporter||'') + (dtStr ? ' · '+dtStr : '') + '</div>' +
      (msr.instrument ? '<div class="msr-popup-info">'+msr.instrument+'</div>' : '') +
      '</div>'
    );
    _msrMarkers.push(label);
  });
}

// 環境輻射監測站圖層（官方固定站，菱形標記）
// ════════════════════════════════════════════
var _envMarkers   = [];
var _envTimer     = null;
var _envLayerOn   = false; // 預設關閉，使用者主動勾選才載入

// ── 開關環境監測站圖層 ──
function onEnvChk(checked) {
  _envLayerOn = checked;
  if (checked) {
    loadEnvMonitor();
    startEnvTimer();
  } else {
    stopEnvTimer();
    _envMarkers.forEach(function(m) { m.remove(); });
    _envMarkers = [];
  }
}

// ── 啟動 30 秒定時更新（GAS proxy 有執行時間限制，不要太頻繁）──
function startEnvTimer() {
  stopEnvTimer();
  _envTimer = setInterval(function() {
    if (_envLayerOn) loadEnvMonitor();
  }, 30000);
}

function stopEnvTimer() {
  if (_envTimer) { clearInterval(_envTimer); _envTimer = null; }
}

// ── 從 GAS proxy 抓官方 CSV 並渲染 ──
function loadEnvMonitor() {
  _jsonpGet(SHEETS_URL + '?action=envMonitor', function(data) {
    if (!data || !data.stations) return;
    // 清除舊標記
    _envMarkers.forEach(function(m) { m.remove(); });
    _envMarkers = [];
    renderEnvMarkers(data.stations);
  });
}

// ── 渲染環境監測站標記（菱形圓點 + 指引線 + 數值標籤）──
function renderEnvMarkers(stations) {
  var LW = 140, LH = 34;
  var R_MIN  = 60;
  var R_STEP = LH + 14;
  var R_MAX  = 220;
  var CLUSTER_R = 120;

  // 轉像素座標
  var pts = stations.filter(function(st) {
    return !isNaN(parseFloat(st.lat)) && !isNaN(parseFloat(st.lng)) && !isNaN(parseFloat(st.value));
  }).map(function(st) {
    var ll = L.latLng(parseFloat(st.lat), parseFloat(st.lng));
    return { st: st, ll: ll, px: gMap.latLngToLayerPoint(ll) };
  });

  // 群聚偵測
  var assigned = pts.map(function() { return -1; });
  var groups   = [];
  pts.forEach(function(pt, i) {
    if (assigned[i] >= 0) return;
    var grp = [i]; assigned[i] = groups.length;
    pts.forEach(function(pt2, j) {
      if (assigned[j] >= 0) return;
      var dx = pt.px.x - pt2.px.x, dy = pt.px.y - pt2.px.y;
      if (Math.sqrt(dx*dx + dy*dy) < CLUSTER_R) { grp.push(j); assigned[j] = groups.length; }
    });
    groups.push(grp);
  });

  // 扇形角度分配：以群心為原點，每個點朝遠離群心的方向展開標籤
  // 這樣可以避免指引線互相交叉
  groups.forEach(function(grp) {
    var n = grp.length;
    // 計算群心
    var cx = 0, cy = 0;
    grp.forEach(function(i) { cx += pts[i].px.x; cy += pts[i].px.y; });
    cx /= n; cy /= n;

    if (n === 1) {
      // 單點：右上方
      pts[grp[0]].fanAngle = -45;
    } else {
      // 多點：每個點從自身到群心的反方向延伸（即朝外展開）
      // 按數值降冪排序後，若角度太相近就均分調整
      grp.sort(function(a, b) {
        return parseFloat(pts[b].st.value) - parseFloat(pts[a].st.value);
      });
      var angles = grp.map(function(i) {
        var dx = pts[i].px.x - cx;
        var dy = pts[i].px.y - cy;
        // 若點剛好在群心上，預設往右
        if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return 0;
        return Math.atan2(dy, dx) * 180 / Math.PI;
      });
      // 確保相鄰角度至少差 35°，避免標籤重疊
      var MIN_GAP = 35;
      for (var pass = 0; pass < 3; pass++) {
        for (var ai = 0; ai < angles.length - 1; ai++) {
          var diff = angles[ai + 1] - angles[ai];
          if (Math.abs(diff) < MIN_GAP) {
            var push = (MIN_GAP - Math.abs(diff)) / 2;
            angles[ai]     -= push;
            angles[ai + 1] += push;
          }
        }
      }
      grp.forEach(function(i, gi) { pts[i].fanAngle = angles[gi]; });
    }
  });

  // 碰撞避讓
  function overlaps(a, b) {
    var PAD = 16; // ★ 加大間距，確保標籤絕對不重疊
    return !(a.x + a.w + PAD < b.x || b.x + b.w + PAD < a.x ||
             a.y + a.h + PAD < b.y || b.y + b.h + PAD < a.y);
  }
  var placed = [];

  pts.forEach(function(pt) {
    var rad = pt.fanAngle * Math.PI / 180;
    var found = false;
    for (var r = R_MIN; r <= R_MAX; r += R_STEP) {
      var lx = pt.px.x + r * Math.cos(rad);
      var ly = pt.px.y + r * Math.sin(rad);
      var rect = { x: lx - LW/2, y: ly - LH/2, w: LW, h: LH };
      if (!placed.some(function(p) { return overlaps(rect, p); })) {
        placed.push(rect);
        pt.offLL = gMap.layerPointToLatLng(L.point(lx, ly));
        found = true;
        break;
      }
    }
    if (!found) {
      var lx2 = pt.px.x + R_MAX * Math.cos(rad);
      var ly2 = pt.px.y + R_MAX * Math.sin(rad);
      var mSize2 = gMap.getSize();
      lx2 = Math.max(LW/2 + 8, Math.min(mSize2.x - LW/2 - 8, lx2));
      ly2 = Math.max(LH/2 + 8, Math.min(mSize2.y - LH/2 - 8, ly2));
      placed.push({ x: lx2 - LW/2, y: ly2 - LH/2, w: LW, h: LH });
      pt.offLL = gMap.layerPointToLatLng(L.point(lx2, ly2));
    }
  });

  // 渲染：菱形圓點 + 指引線 + 數值標籤
  pts.forEach(function(pt) {
    var st  = pt.st;
    var val = parseFloat(st.value);
    // 顏色分界與量測回報相同（>=100 紅、>=0.5 橘、<0.5 綠）
    var col = val >= 100 ? '#dc2626' : val >= 0.5 ? '#f97316' : '#16a34a';
    var offLL = pt.offLL;

    // 菱形圓點（旋轉 45° 的正方形，區別於量測回報的圓點）
    var dotIcon = L.divIcon({
      className: '',
      html: '<div style="width:12px;height:12px;background:' + col + ';' +
            'border:2px solid white;transform:rotate(45deg);' +
            'box-shadow:0 1px 6px rgba(0,0,0,.5)"></div>',
      iconSize: [12, 12], iconAnchor: [6, 6]
    });
    _envMarkers.push(L.marker(pt.ll, { icon: dotIcon, interactive: false }).addTo(gMap));

    // 指引線（虛線）
    _envMarkers.push(L.polyline([pt.ll, offLL], {
      color: col, weight: 2, opacity: 0.75, dashArray: '5 3'
    }).addTo(gMap));

    // 數值標籤
    var labelIcon = L.divIcon({
      className: '',
      html: '<div style="background:white;border-left:4px solid ' + col + ';' +
            'border-radius:5px;padding:4px 10px 4px 8px;' +
            'box-shadow:0 2px 8px rgba(0,0,0,.18);' +
            'white-space:nowrap;display:inline-flex;align-items:baseline;gap:3px;">' +
            '<span style="font-size:13px;font-weight:800;color:#1e2a3a;font-family:ui-monospace,monospace">' +
            val.toFixed(3) + '</span>' +
            '<span style="font-size:10px;color:#6b7a92;font-family:ui-monospace,monospace">&#x03BC;Sv/h</span>' +
            '</div>',
      iconAnchor: [LW/2, LH/2]
    });
    var label = L.marker(offLL, { icon: labelIcon }).addTo(gMap);
    label.bindPopup(
      '<div style="font-family:var(--font);min-width:150px">' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:3px">&#x25C6; ' + _esc(st.name) + '</div>' +
      '<div style="font-size:11px;color:#6b7a92;margin-bottom:6px">' + _esc(st.nameEn) + '</div>' +
      '<div style="font-size:20px;font-weight:800;color:' + col + '">' + val.toFixed(3) +
      ' <span style="font-size:11px;color:#6b7a92">&#x03BC;Sv/h</span></div>' +
      '<div style="font-size:11px;color:#94a3b8;margin-top:4px">更新：' + _esc(st.time) + '</div>' +
      '<div style="font-size:10px;color:#cbd5e1;margin-top:2px">官方環境輻射監測站</div>' +
      '</div>'
    );
    _envMarkers.push(label);
  });
}

// ── 圖層面板收合 ──
function toggleMsrLayer(idx) {
  var cb = document.getElementById('lyr_' + idx + '_msr');
  if (!cb) return;
  if (cb.checked) {
    loadMeasurements(idx, true);
    startMsrTimer(idx);
  } else {
    stopMsrTimer();
    _msrMarkers.forEach(function(m) { m.remove(); });
    _msrMarkers = [];
  }
}

function toggleLayerPanel() {
  var panel = document.getElementById('layerPanel');
  var btn   = document.getElementById('layerCollapseBtn');
  var collapsed = panel.classList.toggle('collapsed');
  btn.innerHTML = collapsed ? '&#x25BC;' : '&#x25B2;';
}

// ── 在地圖放置所有事件標記 ──
function placeMarkers() {
  _markers.forEach(function(m) { m.remove(); });
  _markers = [];
  if (!gMap) return;

  _events.forEach(function(ev, i) {
    var lat = parseFloat(ev.lat), lng = parseFloat(ev.lng);
    if (isNaN(lat) || isNaN(lng)) return;

    var typeClass = '#1a56db';
    if ((ev.type||'').indexOf('輻射彈') !== -1) typeClass = '#dc2626';
    else if ((ev.type||'').indexOf('物質') !== -1) typeClass = '#d97706';

    var icon = L.divIcon({
      className: '',
      html: '<div style="width:18px;height:18px;background:' + typeClass + ';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 18]
    });

    var marker = L.marker([lat, lng], { icon: icon }).addTo(gMap);
    marker.bindPopup(
      '<b>' + (ev.name || '') + '</b><br>' +
      (ev.type || '') + '<br>' +
      formatDateTime(ev.date, ev.time)
    );
    marker.on('click', function() {
      _curIdx = i;
      // 切換事件時自動停止導航
      if (_navFollowing) stopNavMode();
      renderCard(i);
      renderLayerPanel();
      var card = document.getElementById('evCard');
      if (card.classList.contains('collapsed')) toggleCollapse();
    });
    _markers.push(marker);
  });
}

// ── 載入事件 ──
// ── pendingIdx：setIdx message 比 _events 早到時暫存 ──
var _pendingIdx = null;

// ── 接收父層的 setIdx / setEventId ──
var _pendingEventId = null;
window.addEventListener('message', function(e) {
  if (!e.data) return;

  // ── 編輯地圖模式開關 ──
  if (e.data.type === 'mapEditMode') {
    var on = !!e.data.on;
    _mapEditOn = on; // ★ 同步旗標，控制右鍵選單
    var editBtn   = document.getElementById('evEditBtn');
    var toolbar   = document.getElementById('drawToolbar');
    if (editBtn) editBtn.style.display = on ? '' : 'none';
    if (toolbar) toolbar.style.display = on ? '' : 'none';
    setTimeout(updateFabPosition, 50); // ★ 工具列開關後更新 FAB 位置
    if (!on) {
      var panel = document.getElementById('evEditPanel');
      if (panel && panel.classList.contains('show')) toggleEditPanel();
      if (_drawMode) setDrawMode(_drawMode);
    }
    return;
  }

  // ── 導航模式：定位使用者 → 規劃步行到編號3 ──
  // ── 顯示/隱藏浮動回報按鈕（手機用） ──
  if (e.data.type === 'showReportBtns') {
    showReportFabs();
    return;
  }
  if (e.data.type === 'hideReportBtns') {
    hideReportFabs();
    return;
  }

  // ── parent 請求點位清單 ──
  if (e.data.type === 'getNavPoints') {
    var ev = _events[_curIdx];
    if (!ev || !ev.lat || !ev.windDir) {
      try { parent.postMessage({ type: 'navPoints', points: [] }, '*'); } catch(e) {}
      return;
    }
    var la = parseFloat(ev.lat), lo = parseFloat(ev.lng);
    var wd = (parseFloat(ev.windDir) + 180) % 360;
    // 10 個點位定義（與地圖標記一致）
    var pts = [
      { label:'1',  shortTip:'1km中線',   pt: destPoint(la, lo, wd,        1000) },
      { label:'2',  shortTip:'500m中線',   pt: destPoint(la, lo, wd,         500) },
      { label:'3',  shortTip:'2km中線',    pt: destPoint(la, lo, wd,        2000) },
      { label:'4',  shortTip:'3km上緣',    pt: destPoint(la, lo, wd - 22.5, 3000) },
      { label:'5',  shortTip:'3km中線',    pt: destPoint(la, lo, wd,        3000) },
      { label:'6',  shortTip:'3km下緣',    pt: destPoint(la, lo, wd + 22.5, 3000) },
      { label:'7',  shortTip:'4km中線',    pt: destPoint(la, lo, wd,        4000) },
      { label:'8',  shortTip:'5km上緣',    pt: destPoint(la, lo, wd - 22.5, 5000) },
      { label:'9',  shortTip:'5km中線',    pt: destPoint(la, lo, wd,        5000) },
      { label:'10', shortTip:'5km下緣',    pt: destPoint(la, lo, wd + 22.5, 5000) }
    ];
    try { parent.postMessage({ type: 'navPoints', points: pts }, '*'); } catch(err) {}
    return;
  }

  if (e.data.type === 'startNavigation') {
    // ★ 接收目標點位選擇
    if (e.data.targetLabel) {
      _navTargetPt = { label: e.data.targetLabel, pt: e.data.targetPt };
    } else {
      _navTargetPt = null; // 未指定則 startNavMode 用預設
    }
    startNavMode();
    return;
  }
  // 舊式 idx
  if (e.data.type === 'setIdx' && typeof e.data.idx === 'number') {
    if (_events.length > 0) {
      var idx = Math.min(e.data.idx, _events.length - 1);
      _curIdx = idx; renderCard(idx); flyToEvent(idx);
    } else {
      _pendingIdx = e.data.idx;
    }
  }
  // 新式 eventId（從建立事件頁跳過來）
  if (e.data.type === 'setEventId' && e.data.id) {
    if (_events.length > 0) {
      var found = -1;
      for (var i = 0; i < _events.length; i++) {
        if (_events[i].id === e.data.id) { found = i; break; }
      }
      if (found >= 0) { _curIdx = found; renderCard(found); flyToEvent(found); }
    } else {
      _pendingEventId = e.data.id;
    }
  }
});

function loadEvents() {
  // 先載入隊別清單，再載入事件（確保 TECH_SQUADS 有值）
  loadSquads(function(squads) { TECH_SQUADS = squads.concat(['未分配']); });
  _jsonpGet(SHEETS_URL + '?action=events', function(data) {
    _events = (data && data.events) ? data.events : [];
    // 套用 pendingIdx（postMessage 比 JSONP 早到的情況）
    if (_pendingEventId !== null) {
      var found = -1;
      for (var i = 0; i < _events.length; i++) {
        if (_events[i].id === _pendingEventId) { found = i; break; }
      }
      _curIdx = found >= 0 ? found : 0;
      _pendingEventId = null;
    } else if (_pendingIdx !== null && _pendingIdx < _events.length) {
      _curIdx = _pendingIdx;
    } else {
      // 檢查 sessionStorage 是否有 gotoEventId
      try {
        var gotoId = sessionStorage.getItem('gotoEventId');
        if (gotoId) {
          sessionStorage.removeItem('gotoEventId');
          var found2 = -1;
          for (var j = 0; j < _events.length; j++) {
            if (_events[j].id === gotoId) { found2 = j; break; }
          }
          _curIdx = found2 >= 0 ? found2 : 0;
        } else {
          _curIdx = 0;
        }
      } catch(e) { _curIdx = 0; }
    }
    _pendingIdx = null;
    renderCard(_curIdx);
    placeMarkers();
    renderLayerPanel();          // 渲染圖層控制面板
    updateLayers();              // 建立所有事件圖層
    if (_events.length) flyToEvent(_curIdx);
    notifyReady();
  });
}

// ════════════════════════════════════════════
// 畫筆工具（Leaflet Polyline，座標為經緯度，自動隨地圖縮放）
// ════════════════════════════════════════════
var _drawMode    = null;      // 'pen' | 'erase' | null
var _drawColor   = '#dc2626'; // 目前畫筆顏色
var _drawLines   = [];        // 所有已畫的 Polyline 物件
var _curLine     = null;      // 正在畫的 Polyline
var _curLatLngs  = [];        // 正在畫的座標陣列
var _isDrawing   = false;

// ── 切換模式 ──
function setDrawMode(mode) {
  var mapEl = document.getElementById('map');
  if (_drawMode === mode) {
    // 再按一次 = 取消該模式
    _drawMode = null;
    mapEl.classList.remove('draw-mode', 'erase-mode');
    document.getElementById('btnPen').classList.remove('active');
    document.getElementById('btnErase').classList.remove('active-erase');
    gMap.dragging.enable();
    return;
  }
  _drawMode = mode;
  // 清除兩顆按鈕狀態
  document.getElementById('btnPen').classList.remove('active');
  document.getElementById('btnErase').classList.remove('active-erase');
  mapEl.classList.remove('draw-mode', 'erase-mode');

  if (mode === 'pen') {
    document.getElementById('btnPen').classList.add('active');
    mapEl.classList.add('draw-mode');
    gMap.dragging.disable(); // 畫筆模式鎖定地圖拖曳
  } else if (mode === 'erase') {
    document.getElementById('btnErase').classList.add('active-erase');
    mapEl.classList.add('erase-mode');
    gMap.dragging.disable();
  }
}

// ── 設定顏色 ──
function setDrawColor(el) {
  document.querySelectorAll('.draw-color-dot').forEach(function(d) {
    d.classList.remove('selected');
  });
  el.classList.add('selected');
  _drawColor = el.getAttribute('data-color');
}

// ── 清除所有筆跡（同步刪除 Sheets）──
function clearAllDrawings() {
  if (!confirm('確定清除所有標註？此操作將同步刪除雲端資料。')) return;
  _drawLines.forEach(function(l) { l.remove(); });
  _drawLines = [];
  _savePending = true; // 清除進行中，暫停同步避免舊資料被拉回
  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'clearDrawings' })
  }).finally(function() {
    // GAS 寫入需要時間，2 秒後才開放同步
    setTimeout(function() { _savePending = false; }, 2000);
  });
}

// ── 抹除：判斷是否與某筆跡足夠接近，完成後同步存檔 ──
function eraseNear(latlng) {
  var ERASE_PX = 20;
  var clickPx = gMap.latLngToLayerPoint(latlng);
  var changed = false;
  _drawLines = _drawLines.filter(function(line) {
    var lls = line.getLatLngs();
    for (var i = 0; i < lls.length; i++) {
      var pt = gMap.latLngToLayerPoint(lls[i]);
      var dx = pt.x - clickPx.x, dy = pt.y - clickPx.y;
      if (Math.sqrt(dx*dx + dy*dy) < ERASE_PX) {
        line.remove();
        changed = true;
        return false;
      }
    }
    return true;
  });
  if (changed) scheduleDrawingSave();
}

// ── 延遲批次存檔（300ms 防抖）──
var _drawSaveTimer = null;
var _savePending   = false; // 存檔進行中旗標，防止同步覆蓋未存資料

function scheduleDrawingSave() {
  if (_drawSaveTimer) clearTimeout(_drawSaveTimer);
  _drawSaveTimer = setTimeout(saveAllDrawings, 300);
}

// ── 將所有筆跡序列化後送至 Sheets ──
function saveAllDrawings() {
  _savePending = true; // 標記存檔進行中，暫停同步
  var payload = _drawLines.map(function(line) {
    var opts = line.options;
    return {
      pts:    line.getLatLngs().map(function(ll) { return { lat: ll.lat, lng: ll.lng }; }),
      color:  opts.color,
      weight: opts.weight
    };
  });
  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'saveDrawings', drawings: payload })
  }).finally(function() {
    // 存檔完成（或失敗）後 2 秒才允許同步，確保 GAS 寫入完畢
    setTimeout(function() { _savePending = false; }, 2000);
  });
}

// ── 從 Sheets 載入已有標註 ──
function loadDrawings() {
  _jsonpGet(SHEETS_URL + '?action=getDrawings', function(data) {
    if (!data || !data.drawings) return;
    // 畫線中或存檔未完成時跳過，避免覆蓋本機未存資料
    if (_isDrawing || _savePending) return;
    _drawLines.forEach(function(l) { l.remove(); });
    _drawLines = [];
    data.drawings.forEach(function(d) {
      if (!d.pts || d.pts.length < 2) return;
      var lls = d.pts.map(function(p) { return L.latLng(p.lat, p.lng); });
      var line = L.polyline(lls, {
        color:       d.color  || '#dc2626',
        weight:      d.weight || 4,
        opacity:     0.85,
        lineCap:     'round',
        lineJoin:    'round',
        interactive: false  // 不攔截滑鼠事件，避免干擾畫筆操作
      }).addTo(gMap);
      _drawLines.push(line);
    });
  });
}

// ── 每 5 秒自動從 Sheets 同步標註 ──
function startDrawingSyncTimer() {
  setInterval(function() {
    if (_isDrawing || _savePending) return;
    loadDrawings();
  }, 5000);
}

// ════════════════════════════════════════════
// 導航模式：以使用者為中心，路線到編號3
// ════════════════════════════════════════════
var _navRoute     = null;  // 路線 Polyline
var _navDestMk    = null;  // 目的地標記
var _navFollowing = false; // 是否跟隨使用者移動
var _navBanner    = null;  // 頂部導航提示列
var _navTargetPt  = null;  // { label, pt } 使用者選擇的目標點位

function startNavMode() {
  showNavBanner('⏳ 取得您的位置中…', '#6b7a92');

  var timeout = setTimeout(function() {
    showNavBanner('⚠️ 無法取得您的位置，請確認定位權限', '#dc2626');
  }, 10000);

  var check = setInterval(function() {
    if (_userMarker) {
      clearInterval(check);
      clearTimeout(timeout);
      var userLL = _userMarker.getLatLng();
      var ev = _events[_curIdx];
      if (!ev || !ev.lat || !ev.windDir) {
        showNavBanner('⚠️ 目前事件無座標或風向資料，無法規劃路線', '#dc2626');
        return;
      }
      var la = parseFloat(ev.lat), lo = parseFloat(ev.lng);
      var wd = (parseFloat(ev.windDir) + 180) % 360;

      // 使用者選擇的點位（由 index.html 傳入），預設編號3
      var target = _navTargetPt || { label: '3', pt: destPoint(la, lo, wd, 2000) };
      var navPt = target.pt;

      _navFollowing = true;
      // 僅初始進入時飛到使用者位置，後續由圖釘按鈕控制
      gMap.setView(userLL, 16);

      if (_navDestMk) _navDestMk.remove();
      var destIcon = L.divIcon({
        className: '',
        html: '<div style="width:28px;height:28px;background:#8b5cf6;border:3px solid white;' +
              'transform:rotate(45deg);box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>',
        iconSize: [28, 28], iconAnchor: [14, 14]
      });
      _navDestMk = L.marker(navPt, { icon: destIcon }).addTo(gMap);
      _navDestMk.bindTooltip('目的地：編號' + target.label, { permanent: true, direction: 'top', offset: [0, -16] });

      planRoute(userLL.lat, userLL.lng, navPt[0], navPt[1]);
      updateNavBannerTarget(target, navPt);
      showRecenterBtn();

      // dragstart 在 initMap 已全域監聽，此處只標記已綁定
      if (!_navDragBound) { _navDragBound = true; }
    }
  }, 300);

  // 定時更新位置跟隨和路線重算
  if (!_navFollowListener) {
    _navFollowListener = setInterval(function() {
      if (!_userMarker) return;
      var uLL = _userMarker.getLatLng();

      // 跟隨模式：地圖跟著藍點走（每 2 秒更新一次，不強制，讓使用者可以自由拖動）
      if (_navFollowing) {
        gMap.panTo(uLL, { animate: true, duration: 1.0 });
      }

      // 每 15 秒重新規劃路線（無論是否跟隨）
      if (_events[_curIdx] && _navReplanCount++ % 50 === 0) {
        var ev2 = _events[_curIdx];
        var wd2 = (parseFloat(ev2.windDir) + 180) % 360;
        var tgt = _navTargetPt || { pt: destPoint(parseFloat(ev2.lat), parseFloat(ev2.lng), wd2, 2000) };
        planRoute(uLL.lat, uLL.lng, tgt.pt[0], tgt.pt[1]);
      }
    }, 2000); // ★ 改為 2 秒更新一次，讓使用者可以自由拖動地圖
  }
}

// ── 右下角圖釘：點擊行為 ──

var _navModeActive = false;

// ── 使用永久圖釘按鈕作為「重新置中」鈕 ──
function showRecenterBtn() {

var _navFollowListener = null;
var _navReplanCount    = 0;
var _navDragBound      = false;

function updateNavBannerTarget(target, pt) {
  showNavBanner(
    '🧭 前往編號' + target.label + '　' +
    '<button onclick="window.__stopNav&&window.__stopNav()" style="margin-left:12px;padding:3px 10px;border:1px solid white;' +
    'border-radius:4px;background:rgba(255,255,255,.2);color:white;cursor:pointer;' +
    'font-family:inherit;font-size:12px">取消導航</button>',
    '#7c3aed'
  );
}

function planRoute(fromLat, fromLng, toLat, toLng) {
  var url = 'https://router.project-osrm.org/route/v1/foot/' +
            fromLng + ',' + fromLat + ';' +
            toLng   + ',' + toLat   +
            '?overview=full&geometries=geojson';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.routes || !data.routes.length) return;
      var coords = data.routes[0].geometry.coordinates.map(function(c) {
        return [c[1], c[0]];
      });
      if (_navRoute) _navRoute.remove();
      _navRoute = L.polyline(coords, {
        color: '#7c3aed', weight: 5, opacity: 0.85,
        lineCap: 'round', lineJoin: 'round'
      }).addTo(gMap);

      var distM   = Math.round(data.routes[0].distance);
      // 步行速度約 5km/h = 83.3m/min，OSRM 的 duration 是汽車/自行車速，不適用步行
      var walkMin = Math.round(distM / 83.3);
      // 距離超過 1000m 換算公里
      var distStr = distM >= 1000
        ? (distM / 1000).toFixed(1) + ' km'
        : distM + ' m';
      var lbl = _navTargetPt ? _navTargetPt.label : '3';
      showNavBanner(
        '🧭 前往編號' + lbl + '　步行約 ' + distStr + '（約 ' + walkMin + ' 分鐘）　' +
        '<button onclick="window.__stopNav&&window.__stopNav()" style="margin-left:12px;padding:3px 10px;border:1px solid white;' +
        'border-radius:4px;background:rgba(255,255,255,.2);color:white;cursor:pointer;' +
        'font-family:inherit;font-size:12px">取消導航</button>',
        '#7c3aed'
      );
    })
    .catch(function() {
      if (_navRoute) _navRoute.remove();
      var uLL = _userMarker ? _userMarker.getLatLng() : null;
      if (uLL) {
        _navRoute = L.polyline([[uLL.lat, uLL.lng], [toLat, toLng]], {
          color: '#7c3aed', weight: 4, opacity: 0.7, dashArray: '10 6'
        }).addTo(gMap);
      }
    });
}

function stopNavMode() {
  _navFollowing  = false;
  _navDragBound  = false;
  _navReplanCount = 0;
  if (_navFollowListener) { clearInterval(_navFollowListener); _navFollowListener = null; }
  if (_navRoute)  { _navRoute.remove();  _navRoute  = null; }
  if (_navDestMk) { _navDestMk.remove(); _navDestMk = null; }
  gMap.off('dragstart'); // 移除拖動監聽
  hideNavBanner();
  removeRecenterBtn();
}

function showNavBanner(html, bg) {
  // ── iOS iframe 問題：position:fixed 在 iframe 裡會相對整個視窗定位，
  //    蓋住 index.html 的 topbar。解法：postMessage 請 parent 顯示 banner。
  try {
    parent.postMessage({ type: 'navBanner', content: html, bg: bg || '#7c3aed' }, '*');
  } catch(e) {}

  // 若獨立開啟（非 iframe），自行在本頁顯示 banner
  if (window === window.top) {
    var b = document.getElementById('navBanner');
    if (!b) {
      b = document.createElement('div');
      b.id = 'navBanner';
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;' +
        'padding:10px 20px;color:white;font-size:13px;font-weight:600;' +
        'display:flex;align-items:center;justify-content:center;' +
        'font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei",sans-serif;' +
        'box-shadow:0 2px 8px rgba(0,0,0,.2);';
      document.body.appendChild(b);
    }
    b.style.background = bg || '#7c3aed';
    b.innerHTML = html;
  }
}

function hideNavBanner() {
  // 通知 parent 隱藏 banner
  try { parent.postMessage({ type: 'navBanner', content: null }, '*'); } catch(e) {}
  // 若獨立開啟，移除本地 banner
  var b = document.getElementById('navBanner');
  if (b) b.remove();
}

var _assignLatLng  = null;
var _selectedSquad = '';

// ── 從事件的 personnelStr 解析有哪些組別參與 ──
function getEventSquads(ev) {
  if (!ev) return [];
  var found = [];
  if (ev.personnelStr) {
    ev.personnelStr.split(',').forEach(function(item) {
      var s = item.trim();
      // 格式：「隊別:姓名」，冒號前為隊別
      // 注意隊別本身可能含「-」（如「北部應變區-先遣小組」），取最後一個冒號前
      var colonIdx = s.lastIndexOf(':');
      if (colonIdx > 0) {
        var squad = s.slice(0, colonIdx).trim();
        if (squad && found.indexOf(squad) === -1) found.push(squad);
      }
    });
  }
  if (found.length > 0) return found;
  // 無法解析組別（舊格式純姓名）→ 回傳空陣列
  return [];
}

// ── 開啟分派 Modal ──
function openAssignModal(latlng) {
  _assignLatLng  = latlng;
  _selectedSquad = '';
  var ev = _events[_curIdx];

  document.getElementById('assignCoordVal').textContent =
    latlng.lat.toFixed(6) + ', ' + latlng.lng.toFixed(6);
  document.getElementById('assignAddrVal').textContent  = '查詢地址中…';
  document.getElementById('assignNote').value = '';
  document.getElementById('assignSubmitBtn').disabled = true;
  document.getElementById('assignSubmitBtn').textContent = '派遣量測任務';
  document.getElementById('squadOptions').innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">⏳ 載入組別中…</div>';
  document.getElementById('assignModal').style.display = 'flex';
  // ★ 重置拖曳位置後初始化拖曳
  var card = document.querySelector('#assignModal .modal-card');
  if (card) { card.style.left=''; card.style.top=''; card.style.position=''; card.style.margin=''; }
  document.getElementById('assignModal').style.alignItems = '';
  document.getElementById('assignModal').style.justifyContent = '';
  setTimeout(initAssignDrag, 50);

  // ★ 確保隊別清單已載入，再建組別選項
  loadSquads(function(squads) {
    TECH_SQUADS = squads.concat(['未分配']);
    var evSquads = getEventSquads(ev);
    var optHtml = '';
    evSquads.forEach(function(sq) {
      var emoji = sq.indexOf('參謀') !== -1 ? '🎖️' :
                  sq.indexOf('新聞') !== -1 ? '📡' : '🔬';
      optHtml +=
        '<label class="squad-option" onclick="selectSquad(\'' + _esc(sq) + '\', this)">' +
        '<input type="radio" name="squadRadio" value="' + _esc(sq) + '">' +
        '<span>' + emoji + ' ' + _esc(sq) + '</span>' +
        '</label>';
    });
    if (!optHtml) {
      optHtml = '<div style="color:var(--text-muted);font-size:13px;padding:4px 0">⚠️ 此事件尚無人員記錄</div>';
    }
    document.getElementById('squadOptions').innerHTML = optHtml;
  });

  reverseGeocode(latlng.lat, latlng.lng, function(addr) {
    document.getElementById('assignAddrVal').textContent = addr || '（無法取得地址）';
  });
}

// ── 送出量測任務 ──
// 策略：先建立地圖標記 + 關閉 Modal，再背景同步 GAS（fire-and-forget）
function submitAssignment() {
  if (!_selectedSquad || !_assignLatLng) return;
  var ev = _events[_curIdx];
  if (!ev) { alert('找不到目前事件'); return; }

  var note    = document.getElementById('assignNote').value.trim();
  var addrStr = document.getElementById('assignAddrVal').textContent;
  var locDesc = '座標：' + _assignLatLng.lat.toFixed(6) + ', ' + _assignLatLng.lng.toFixed(6) +
                '　地址：' + addrStr;
  var content = locDesc + (note ? '\n備註：' + note : '');

  // 先存起來，closeAssignModal 會清掉原始變數
  var latlng = _assignLatLng;
  var squad  = _selectedSquad;

  // ★ 步驟1：立即建立標記、關閉 Modal
  closeAssignModal();
  placeTempMeasureMarker(latlng, squad);
  showToast('✅ 已建立量測點，同步中…');

  // ★ 步驟2：背景送出 GAS（不阻擋使用者）
  var payload = {
    action:   'addTask',
    eventId:  ev.id,
    target:   squad,
    title:    '量測點任務',
    content:  content,
    priority: 'high'
  };
  fetch(SHEETS_URL, {

// 回報劑量 Modal（含定位、人員、劑量、儀器、拖曳）

var _msrLat = null, _msrLng = null;

function openMeasureModal() {
  var modal = document.getElementById('measureModal');
  var ev    = _events[_curIdx];
  if (!ev) { showToast('⚠️ 目前無進行中事件'); return; }

  // 重置欄位
  document.getElementById('msrValue').value      = '';
  document.getElementById('msrInstrument').value = '';
  document.getElementById('msrSubmitBtn').textContent = '送出回報';
  document.getElementById('msrSubmitBtn').disabled    = false;
  document.getElementById('msrCoordVal').textContent  = '取得中…';

  // 填充人員清單（從事件的 personnelStr）
  var sel = document.getElementById('msrReporter');
  sel.innerHTML = '<option value="">— 選擇人員 —</option>';
  if (ev.personnelStr) {
    ev.personnelStr.split(',').forEach(function(item) {
      var s = item.trim();
      var colonIdx = s.lastIndexOf(':');
      var name = colonIdx >= 0 ? s.slice(colonIdx + 1).trim() : s;
      if (name) {
        var opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      }
    });
  }

  // 取目前使用者位置
  _msrLat = null; _msrLng = null;
  if (_userMarker) {
    var ll = _userMarker.getLatLng();
    _msrLat = ll.lat; _msrLng = ll.lng;
    document.getElementById('msrCoordVal').textContent =
      _msrLat.toFixed(6) + ', ' + _msrLng.toFixed(6);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      _msrLat = pos.coords.latitude;
      _msrLng = pos.coords.longitude;
      document.getElementById('msrCoordVal').textContent =
        _msrLat.toFixed(6) + ', ' + _msrLng.toFixed(6);
    }, function() {
      document.getElementById('msrCoordVal').textContent = '（無法取得定位）';
    });
  }

  modal.style.display = 'block';
  initMeasureDrag();
}

function closeMeasureModal() {
  document.getElementById('measureModal').style.display = 'none';
}

function submitMeasure() {
  var ev       = _events[_curIdx];
  var reporter = document.getElementById('msrReporter').value.trim();
  var value    = document.getElementById('msrValue').value.trim();
  var instr    = document.getElementById('msrInstrument').value.trim();

  if (!reporter) { showToast('⚠️ 請選擇回報人員'); return; }
  if (!value || isNaN(parseFloat(value))) { showToast('⚠️ 請輸入有效的劑量值'); return; }

  var btn = document.getElementById('msrSubmitBtn');
  btn.disabled    = true;
  btn.textContent = '送出中…';

  var payload = {
    action:     'addMeasurement',
    eventId:    ev ? ev.id : '',
    reporter:   reporter,
    value:      parseFloat(value).toString(),
    instrument: instr,
    lat:        _msrLat ? _msrLat.toString() : '',
    lng:        _msrLng ? _msrLng.toString() : ''
  };

  fetch(SHEETS_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body:    JSON.stringify(payload)
  })
  .then(function() {
    closeMeasureModal();
    showToast('✅ 劑量回報已送出');
    // 強制重載量測標記
    if (ev) { _msrCache[ev.id] = null; loadMeasurements(_curIdx, true); }
  })
  .catch(function() {
    btn.disabled    = false;
    btn.textContent = '送出回報';
    showToast('⚠️ 送出失敗，請確認網路連線');
  });
}

// ── 拖曳功能（drag bar 拖曳整張 card）──
function initMeasureDrag() {
  var card = document.getElementById('measureCard');
  var bar  = document.getElementById('measureDragBar');
  if (!card || !bar) return;

  // 重置位置到初始
  card.style.left      = '50%';
  card.style.top       = '80px';
  card.style.transform = 'translateX(-50%)';

  var startX, startY, startL, startT;
  function onDown(e) {
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var rect = card.getBoundingClientRect();
    startX = clientX; startY = clientY;
    startL = rect.left; startT = rect.top;
    card.style.left      = startL + 'px';
    card.style.top       = startT + 'px';
    card.style.transform = 'none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend',  onUp);
  }
  function onMove(e) {
    if (e.touches) e.preventDefault();
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var newL = startL + (clientX - startX);
    var newT = startT + (clientY - startY);
    // 限制在視窗內
    newL = Math.max(0, Math.min(window.innerWidth  - card.offsetWidth,  newL));
    newT = Math.max(0, Math.min(window.innerHeight - card.offsetHeight, newT));
    card.style.left = newL + 'px';
    card.style.top  = newT + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);
  }
  bar.addEventListener('mousedown',  onDown);
  bar.addEventListener('touchstart', onDown, { passive: true });
}


// ── assign Modal 拖曳功能 ──
function initAssignDrag() {
  var card = document.querySelector('#assignModal .modal-card');
  var header = document.querySelector('#assignModal .modal-header');
  if (!card || !header) return;
  header.style.cursor = 'move';
  var startX, startY;
  function onDown(e) {
    if (e.target.tagName === 'BUTTON') return;
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var rect = card.getBoundingClientRect();
    startX = clientX - rect.left;
    startY = clientY - rect.top;
    // 固定定位
    card.style.position = 'fixed';
    card.style.margin   = '0';
    card.style.left     = rect.left + 'px';
    card.style.top      = rect.top  + 'px';
    // 讓 overlay 不再 flex-center
    document.getElementById('assignModal').style.alignItems  = 'flex-start';
    document.getElementById('assignModal').style.justifyContent = 'flex-start';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend',  onUp);
  }
  function onMove(e) {
    if (e.touches) e.preventDefault();
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var newL = clientX - startX;
    var newT = clientY - startY;
    newL = Math.max(0, Math.min(window.innerWidth  - card.offsetWidth,  newL));
    newT = Math.max(0, Math.min(window.innerHeight - card.offsetHeight, newT));
    card.style.left = newL + 'px';
    card.style.top  = newT + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);
  }
  header.addEventListener('mousedown',  onDown);
  header.addEventListener('touchstart', onDown, { passive: false });
}

// ── 初始化畫筆事件（在 initMap 後呼叫）──
function initDrawTools() {
  var mapEl = document.getElementById('map');

  // ── 滑鼠按下（在地圖上）：開始畫線 ──
  mapEl.addEventListener('mousedown', function(e) {
    if (!_drawMode) return;
    if (e.button !== 0) return;
    e.preventDefault();
    _isDrawing = true;
    var ll = gMap.mouseEventToLatLng(e);
    if (_drawMode === 'pen') {
      _curLatLngs = [ll];
      _curLine = L.polyline(_curLatLngs, {
        color:       _drawColor,
        weight:      parseInt(document.getElementById('drawSize').value),
        opacity:     0.85,
        lineCap:     'round',
        lineJoin:    'round',
        interactive: false  // ★ 不攔截滑鼠事件，畫過自己不會中斷
      }).addTo(gMap);
    } else if (_drawMode === 'erase') {
      eraseNear(ll);
    }
  });

  // ── 滑鼠移動（監聽 document，避免移到 Leaflet 子元素時中斷）──
  document.addEventListener('mousemove', function(e) {
    if (!_isDrawing || !_drawMode) return;
    var ll = gMap.mouseEventToLatLng(e);
    if (_drawMode === 'pen' && _curLine) {
      _curLatLngs.push(ll);
      _curLine.setLatLngs(_curLatLngs);
    } else if (_drawMode === 'erase') {
      eraseNear(ll);
    }
  });

  // ── 滑鼠放開（監聽 document，確保拖出地圖外放開也能結束）──
  document.addEventListener('mouseup', function(e) {
    if (!_isDrawing) return;
    _isDrawing = false;
    if (_drawMode === 'pen' && _curLine) {
      if (_curLatLngs.length > 1) {
        _drawLines.push(_curLine);
        saveAllDrawings();
      } else {
        _curLine.remove();
      }
      _curLine    = null;
      _curLatLngs = [];
    } else if (_drawMode === 'erase') {
      // 抹除結束，scheduleDrawingSave 已在 eraseNear 裡觸發
    }
  });

  // ── 觸控支援（手機/平板）──
  mapEl.addEventListener('touchstart', function(e) {
    if (!_drawMode) return;
    e.preventDefault();
    _isDrawing = true;
    var touch = e.touches[0];
    var ll = gMap.containerPointToLatLng(
      gMap.mouseEventToContainerPoint(touch)
    );
    if (_drawMode === 'pen') {
      _curLatLngs = [ll];
      _curLine = L.polyline(_curLatLngs, {
        color:       _drawColor,
        weight:      parseInt(document.getElementById('drawSize').value),
        opacity:     0.85,
        lineCap:     'round',
        lineJoin:    'round',
        interactive: false
      }).addTo(gMap);
    } else if (_drawMode === 'erase') {
      eraseNear(ll);
    }
  }, { passive: false });

  mapEl.addEventListener('touchmove', function(e) {
    if (!_isDrawing || !_drawMode) return;
    e.preventDefault();
    var touch = e.touches[0];
    var ll = gMap.containerPointToLatLng(
      gMap.mouseEventToContainerPoint(touch)
    );
    if (_drawMode === 'pen' && _curLine) {
      _curLatLngs.push(ll);
      _curLine.setLatLngs(_curLatLngs);
    } else if (_drawMode === 'erase') {
      eraseNear(ll);
    }
  }, { passive: false });

  mapEl.addEventListener('touchend', function() {
    if (!_isDrawing) return;
    _isDrawing = false;
    if (_drawMode === 'pen' && _curLine) {
      if (_curLatLngs.length > 1) {
        _drawLines.push(_curLine);
        saveAllDrawings();
      } else {
        _curLine.remove();
      }
      _curLine    = null;
      _curLatLngs = [];
    }
  });
}

document.addEventListener('DOMContentLoaded', function() {

  }
  function loadScript(src, cb, err) {
    var s = document.createElement('script'); s.src = src; s.onload = cb; s.onerror = err; document.head.appendChild(s);
  }

  function initMap() {
    gMap = L.map('map', { zoomControl: false }).setView([25.046, 121.517], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
    }).addTo(gMap);

    // ── 右鍵選單：顯示暫時圖釘 + context menu ──
    gMap.on('contextmenu', function(e) {

      if (!_mapEditOn) return;
      _ctxLatLng = e.latlng;
      showCtxMenu(e.originalEvent.clientX, e.originalEvent.clientY, e.latlng);
    });

    // 點擊地圖其他地方 → 關閉選單並取消圖釘
    gMap.on('click', function() { hideCtxMenu(); });

    // 縮放或拖動 → 視為取消量測點建議，移除圖釘
    gMap.on('zoomstart', function() { hideCtxMenu(); });
    gMap.on('dragstart',  function() {
      hideCtxMenu();
      // 若同時在導航模式中拖動，停止跟隨
      if (_navFollowing) {

        var btn = document.getElementById('locateBtn');
        if (btn) { btn.style.background = '#ede9fe'; btn.style.borderColor = '#7c3aed'; }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { hideCtxMenu(); closeAssignModal(); }
    });

    // 縮放後像素座標改變，需重新跑碰撞偵測重繪標籤
    gMap.on('moveend', function() {

    });

  }

  loadCSS('https://unpkg.com/leaflet@1.9.4/dist/leaflet.css');
  loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js', initMap, function() {
    loadCSS('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css');

// ════════════════════════════════════════════
// 使用者即時位置（藍點 + 方向扇形 + 精確度圓）
// ════════════════════════════════════════════
var _userMarker   = null;  // 藍點主標記
var _userAccCirc  = null;  // 精確度圓（淡藍色）
var _userDirCone  = null;  // 方向扇形
var _userHeading  = null;  // 目前方向（度）
var _userWatchId  = null;  // watchPosition ID

function initUserLocation() {
  if (!navigator.geolocation) return;

  // ── 監聽裝置方向（手機羅盤）──
  function onOrientation(e) {
    // iOS 用 webkitCompassHeading，Android 用 360 - alpha
    var heading = null;
    if (e.webkitCompassHeading !== undefined) {
      heading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      heading = (360 - e.alpha) % 360;
    }
    if (heading !== null) {
      _userHeading = heading;
      updateUserDirCone();
    }
  }

  // iOS 13+ 需要使用者授權才能讀羅盤
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.addEventListener('click', function askCompass() {
      DeviceOrientationEvent.requestPermission().then(function(state) {
        if (state === 'granted') window.addEventListener('deviceorientation', onOrientation);
      });
      document.removeEventListener('click', askCompass);
    }, { once: true });
  } else {
    window.addEventListener('deviceorientation', onOrientation);
  }

  // ── 持續追蹤位置 ──
  _userWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var acc = pos.coords.accuracy; // 精確度（公尺）

      if (!gMap) return;

      // 精確度圓
      if (_userAccCirc) {
        _userAccCirc.setLatLng([lat, lng]).setRadius(acc);
      } else {
        _userAccCirc = L.circle([lat, lng], {
          radius: acc,
          color: '#2563eb', fillColor: '#93c5fd',
          fillOpacity: 0.15, weight: 1, opacity: 0.4
        }).addTo(gMap);
      }

      // 藍點：自訂 divIcon，帶脈衝動畫
      var dotHtml =
        '<div style="position:relative;width:20px;height:20px">' +
          // 脈衝外環
          '<div style="position:absolute;inset:-6px;border-radius:50%;' +
               'background:rgba(37,99,235,0.2);animation:userPulse 2s ease infinite"></div>' +
          // 白色外圈
          '<div style="position:absolute;inset:0;border-radius:50%;' +
               'background:white;box-shadow:0 0 0 2px rgba(37,99,235,0.4)"></div>' +
          // 藍色實心點
          '<div style="position:absolute;inset:3px;border-radius:50%;background:#2563eb"></div>' +
        '</div>';

      if (_userMarker) {
        _userMarker.setLatLng([lat, lng]);
      } else {
        var icon = L.divIcon({
          className: '',
          html: dotHtml,
          iconSize: [20, 20], iconAnchor: [10, 10]
        });
        _userMarker = L.marker([lat, lng], { icon: icon, zIndexOffset: 500 }).addTo(gMap);
        _userMarker.bindTooltip('您的位置', { direction: 'top', offset: [0, -12] });
      }

      // 方向扇形更新
      updateUserDirCone();
    },
    function(err) {
      console.warn('使用者位置取得失敗：', err.message);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

// ── 更新方向扇形（需要位置和方向都有才顯示）──
function updateUserDirCone() {
  if (!gMap || !_userMarker || _userHeading === null) return;
  var ll  = _userMarker.getLatLng();
  var lat = ll.lat, lng = ll.lng;
  var hdg = _userHeading;
  var FAN = 30;    // 扇形半角（度）
  var R   = 60;    // 扇形半徑（公尺）

  var conePoints = [[lat, lng]];
  for (var i = 0; i <= 12; i++) {
    conePoints.push(destPoint(lat, lng, hdg - FAN + (FAN * 2 * i / 12), R));
  }
  conePoints.push([lat, lng]);

  if (_userDirCone) {
    _userDirCone.setLatLngs(conePoints);
  } else {
    _userDirCone = L.polygon(conePoints, {
      color: '#2563eb', fillColor: '#2563eb',
      fillOpacity: 0.35, weight: 0
    }).addTo(gMap);
  }
}

</script>
