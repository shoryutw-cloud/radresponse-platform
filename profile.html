<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人資料維護</title>
<style>
  :root {
    --accent: #1a56db;
    --text: #1e2a3a;
    --text-muted: #6b7a92;
    --border: #e2e8f0;
    --bg: #f0f2f5;
    --surface: #ffffff;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei",
            "PingFang TC", sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font); background: var(--bg);
    color: var(--text); font-size: 14px;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── 頁首 ── */
  .page-header {
    background: white; border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); position: sticky; top: 0; z-index: 10;
  }
  .page-header h1 { font-size: 16px; font-weight: 700; color: var(--text); }

  /* ── 主體 ── */
  .main { max-width: 520px; margin: 32px auto; padding: 0 20px 40px; width: 100%; }

  /* ── 卡片 ── */
  .card {
    background: white; border-radius: 14px; padding: 28px 28px;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
  }
  .card-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
  }

  /* ── 唯讀資訊列 ── */
  .info-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #f1f5f9;
    font-size: 14px;
  }
  .info-row:last-of-type { border-bottom: none; }
  .info-label { width: 80px; flex-shrink: 0; color: var(--text-muted); font-size: 13px; padding-top: 1px; }
  .info-val { color: var(--text); font-weight: 500; word-break: break-all; }

  /* ── 分隔線 ── */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* ── 表單欄位 ── */
  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px;
    letter-spacing: .04em;
  }
  .field-wrap { position: relative; }
  .field input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius); font-size: 15px; font-family: var(--font);
    color: var(--text); background: #f8fafc; outline: none;
    transition: border-color .15s, background .15s;
  }
  .field input:focus { border-color: var(--accent); background: white; }
  .field input.has-eye { padding-right: 44px; }
  .eye-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 18px;
    color: #94a3b8; line-height: 1; padding: 0;
  }
  .eye-btn:hover { color: var(--accent); }

  /* ── 送出按鈕 ── */
  .submit-btn {
    width: 100%; padding: 12px; border: none; border-radius: var(--radius);
    background: var(--accent); color: white; font-size: 15px; font-weight: 700;
    font-family: var(--font); cursor: pointer; transition: background .15s;
    margin-top: 4px;
  }
  .submit-btn:hover { background: #1648b8; }
  .submit-btn:disabled { background: #93c5fd; cursor: default; }

  /* ── 訊息提示 ── */
  .msg {
    padding: 10px 14px; border-radius: var(--radius); font-size: 14px;
    font-weight: 600; text-align: center; margin-top: 14px; display: none;
  }
  .msg.ok  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
  .msg.err { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }

  /* ── 提示字 ── */
  .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }

  @media (max-width: 480px) {
    .main { padding: 0 12px 40px; margin-top: 20px; }
    .card { padding: 20px 18px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <span style="font-size:20px">🪺</span>
  <h1>個人資料維護</h1>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">👤 目前帳號資訊</div>

    <!-- 唯讀欄位：從 Sheet 讀取 -->
    <div class="info-row"><span class="info-label">姓名</span><span class="info-val" id="dispName">—</span></div>
    <div class="info-row"><span class="info-label">職稱</span><span class="info-val" id="dispTitle">—</span></div>
    <div class="info-row"><span class="info-label">隊別</span><span class="info-val" id="dispTeam">—</span></div>
    <div class="info-row"><span class="info-label">所屬組室</span><span class="info-val" id="dispDept">—</span></div>

    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:20px">✏️ 可編輯欄位</div>

    <div class="field">
      <label>📱 手機</label>
      <input type="tel" id="fMobile" placeholder="請輸入手機號碼">
    </div>
    <div class="field">
      <label>📞 電話</label>
      <input type="tel" id="fPhone" placeholder="請輸入電話號碼">
    </div>
    <div class="field">
      <label>🔑 帳號</label>
      <input type="text" id="fAcc" placeholder="請輸入新帳號" autocomplete="off">
    </div>
    <div class="field">
      <label>🔒 密碼</label>
      <div class="field-wrap">
        <input type="password" id="fPwd" class="has-eye" placeholder="請輸入新密碼" autocomplete="new-password">
        <button class="eye-btn" id="pwdEyeBtn" onclick="togglePwd()" type="button" title="顯示/隱藏密碼">👁</button>
      </div>
      <div class="hint">留空則不修改密碼</div>
    </div>

    <button class="submit-btn" id="saveBtn" onclick="saveProfile()">儲存變更</button>
    <div class="msg" id="statusMsg"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// 個人資料維護 — profile.html
// ════════════════════════════════════════════

var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyO8TvvFgbHJF-l2WJa0hzoHnY8pT64LLgv1vaBVe0OqnSIbyhduQEfjMlyS6eXCzhW/exec';
var _jsonpCounter = 0;

// ── JSONP GET 輔助 ──
function _jsonpGet(url, cb) {
  var name = '_cb' + (_jsonpCounter++);
  window[name] = function(data) { delete window[name]; document.head.removeChild(s); cb(data); };
  var s = document.createElement('script');
  s.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + name;
  s.onerror = function() { delete window[name]; document.head.removeChild(s); cb(null); };
  document.head.appendChild(s);
}

// ── 取登入者資料 ──
var _currentUser = null;   // localStorage 的 user 物件
var _sheetRow = null;      // 從 GAS 讀回的該列 rowIndex 與 groupId

function init() {
  // 從 localStorage 讀登入者
  try {
    var s = localStorage.getItem('radAuth');
    if (s) _currentUser = JSON.parse(s);
  } catch(e) {}

  if (!_currentUser) {
    showMsg('err', '尚未登入，請先登入');
    return;
  }

  // 顯示姓名
  document.getElementById('dispName').textContent = _currentUser.name || '—';

  // 預填帳號（目前登入用的帳號）
  if (_currentUser.acc) document.getElementById('fAcc').value = _currentUser.acc;

  // 向 GAS 查詢此帳號的完整資料（含隊別、手機、rowIndex 等）
  _jsonpGet(SHEETS_URL + '?action=getUserProfile&acc=' + encodeURIComponent(_currentUser.acc || ''), function(data) {
    if (!data || data.error) {
      showMsg('err', '無法載入個人資料：' + (data && data.error ? data.error : '網路錯誤'));
      return;
    }
    _sheetRow = data; // 儲存供 save 時用

    // 填入唯讀欄位
    document.getElementById('dispTitle').textContent = data.title || '—';
    document.getElementById('dispTeam').textContent  = data.team  || '—';
    document.getElementById('dispDept').textContent  = data.dept  || '—';

    // 填入可編輯欄位
    document.getElementById('fMobile').value = data.mobile || '';
    document.getElementById('fPhone').value  = data.phone  || '';
    document.getElementById('fAcc').value    = data.acc    || (_currentUser.acc || '');
  });
}

// ── 密碼顯示切換 ──
function togglePwd() {
  var f = document.getElementById('fPwd');
  var b = document.getElementById('pwdEyeBtn');
  if (f.type === 'password') { f.type = 'text'; b.textContent = '🙈'; }
  else { f.type = 'password'; b.textContent = '👁'; }
}

// ── 儲存 ──
function saveProfile() {
  if (!_currentUser) { showMsg('err', '尚未登入'); return; }
  if (!_sheetRow) { showMsg('err', '資料尚未載入，請稍候再試'); return; }

  var mobile = document.getElementById('fMobile').value.trim();
  var phone  = document.getElementById('fPhone').value.trim();
  var acc    = document.getElementById('fAcc').value.trim();
  var pwd    = document.getElementById('fPwd').value.trim();

  if (!acc) { showMsg('err', '帳號不可為空'); return; }

  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  hideMsg();

  var payload = {
    action:   'editUserProfile',
    groupId:  _sheetRow.groupId,
    rowIndex: _sheetRow.rowIndex,
    mobile:   mobile,
    phone:    phone,
    acc:      acc,
    pwd:      pwd || null   // null 表示不修改密碼
  };

  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    body: JSON.stringify(payload)
  }).then(function() {
    // no-cors 無法讀 response，視為成功
    // 更新 localStorage 的 acc（帳號可能改了）
    try {
      var stored = JSON.parse(localStorage.getItem('radAuth') || '{}');
      stored.acc = acc;
      stored.lastActivity = Date.now();
      localStorage.setItem('radAuth', JSON.stringify(stored));
      _currentUser.acc = acc;
    } catch(e) {}

    btn.disabled = false; btn.textContent = '儲存變更';
    showMsg('ok', '✅ 資料已儲存！');
  }).catch(function(err) {
    btn.disabled = false; btn.textContent = '儲存變更';
    showMsg('err', '儲存失敗：' + err.message);
  });
}

function showMsg(type, text) {
  var el = document.getElementById('statusMsg');
  el.className = 'msg ' + type;
  el.textContent = text;
}
function hideMsg() {
  var el = document.getElementById('statusMsg');
  el.className = 'msg';
}

// 頁面載入後初始化
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
